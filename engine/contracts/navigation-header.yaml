# Contrato máquina — NavigationHeader (Simple DS)
# Origen: https://www.figma.com/design/aMiE3zUmsF6QtqycDarsqi/Simple?node-id=170-2653

figma:
  file_key: aMiE3zUmsF6QtqycDarsqi
  file_name: Simple
  component_set_node_id: "170:2653"
  layer_name: NavigationHeader
  kind: COMPONENT_SET
  default_variant: Predeterminada

variants:
  - name: Predeterminada
    node_id: "112:1853"
    nav_level: L1
    leading: li:align-justify
    title_placement: center
    trailing: li:bell
    bottom_border: true
  - name: Dashboard
    node_id: "170:2660"
    nav_level: L0
    leading: li:align-justify
    title_placement: none
    trailing: li:bell
    bottom_border: false
  - name: Modal
    node_id: "170:2843"
    nav_level: L2_L3
    leading: none
    title_placement: start
    trailing: li:x
    bottom_border: true

properties:
  - name: Type
    kind: VARIANT
    values: [Predeterminada, Dashboard, Modal]
  - name: Title
    kind: TEXT
    default: Title

layout:
  width_px: 390
  height_px: 56
  padding_horizontal:
    token: spacing/padding/horizontal/md
    px: 16
  gap:
    token: spacing/gap/md
    px: 8
  direction: horizontal

tokens:
  background:
    token: background/default/default
    light_hex: "#ffffff"
  text:
    token: text/default/default
    rgb: "15,23,42"
  title_typography:
    family: DM Sans
    weight: 600
    size_px: 16
  border_bottom_subtle:
    token: color/border/subtle
    note: "Ausente en variante Dashboard"

icons:
  size_px: 24
  names: [li:align-justify, li:bell, li:x]

constraints:
  max_per_screen: 1
  stack_order: 0
  title_max_chars: 32
