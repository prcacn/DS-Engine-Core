<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DS Engine - Panel de Revision</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #07080a; --bg2: #0d0f13; --surface: #12151a; --surface2: #181c23;
      --border: #1f242d; --border2: #272d38;
      --breaking: #ff4757; --safe: #00c97a; --additive: #7c6af7;
      --txt: #dde3ed; --txt2: #566070; --txt3: #8a95a3;
      --mono: 'IBM Plex Mono', monospace; --sans: 'IBM Plex Sans', sans-serif;
    }
    html, body { height: 100%; }
    body { background: var(--bg); color: var(--txt); font-family: var(--sans); min-height: 100vh; }
    body::after {
      content: ''; position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(255,255,255,0.008) 4px);
      pointer-events: none; z-index: 9999;
    }
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px; height: 52px; border-bottom: 1px solid var(--border);
      background: rgba(7,8,10,0.9); backdrop-filter: blur(16px);
      position: sticky; top: 0; z-index: 100;
    }
    .topbar-logo {
      font-family: var(--mono); font-size: 11px; font-weight: 700;
      letter-spacing: 0.15em; color: var(--txt); display: flex; align-items: center; gap: 10px;
    }
    .logo-box {
      width: 26px; height: 26px; background: var(--breaking); border-radius: 4px;
      display: grid; place-items: center; font-size: 13px; font-weight: 700; color: #fff;
    }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .badge-count {
      font-family: var(--mono); font-size: 11px; background: var(--breaking);
      color: #fff; padding: 2px 8px; border-radius: 3px; display: none;
    }
    .badge-count.visible { display: inline-block; }
    .btn-refresh {
      font-family: var(--mono); font-size: 11px; background: var(--surface);
      border: 1px solid var(--border2); color: var(--txt3); padding: 6px 14px;
      border-radius: 4px; cursor: pointer; transition: border-color 0.2s, color 0.2s;
    }
    .btn-refresh:hover { border-color: var(--txt3); color: var(--txt); }
    .main { max-width: 860px; margin: 0 auto; padding: 40px 24px 80px; }
    .page-tag {
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--breaking);
      display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
    }
    .page-tag::before { content: ''; width: 16px; height: 1px; background: var(--breaking); }
    .page-title { font-size: 26px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 8px; }
    .page-sub { font-size: 14px; color: var(--txt3); line-height: 1.6; margin-bottom: 36px; }
    .empty-state {
      text-align: center; padding: 80px 24px;
      border: 1px dashed var(--border2); border-radius: 8px; display: none;
    }
    .empty-state.visible { display: block; }
    .empty-icon { font-size: 32px; margin-bottom: 16px; }
    .empty-title { font-size: 16px; font-weight: 500; margin-bottom: 8px; }
    .empty-sub { font-size: 13px; color: var(--txt3); }
    .loading { text-align: center; padding: 60px; font-family: var(--mono); font-size: 12px; color: var(--txt2); }
    .reviews-list { display: flex; flex-direction: column; gap: 12px; }
    .review-card {
      background: var(--surface); border: 1px solid var(--border);
      border-left: 3px solid var(--breaking); border-radius: 8px; overflow: hidden;
    }
    .review-card.resolved { border-left-color: var(--txt2); opacity: 0.5; }
    .review-header { display: flex; align-items: center; gap: 14px; padding: 16px 20px; }
    .review-icon {
      width: 32px; height: 32px; border-radius: 6px;
      background: rgba(255,71,87,0.12); border: 1px solid rgba(255,71,87,0.25);
      display: grid; place-items: center; flex-shrink: 0;
      font-family: var(--mono); font-size: 12px; font-weight: 700; color: var(--breaking);
    }
    .review-info { flex: 1; min-width: 0; }
    .review-name {
      font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--txt);
      margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .review-meta { font-family: var(--mono); font-size: 11px; color: var(--txt2); }
    .review-type {
      font-family: var(--mono); font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.1em; padding: 3px 8px; border-radius: 3px;
      background: rgba(255,71,87,0.1); color: var(--breaking);
      border: 1px solid rgba(255,71,87,0.2); flex-shrink: 0;
    }
    .review-body { padding: 14px 20px 16px; border-top: 1px solid var(--border); }
    .review-key { font-family: var(--mono); font-size: 11px; color: var(--txt2); margin-bottom: 14px; word-break: break-all; }
    .review-actions { display: flex; gap: 8px; align-items: center; }
    .btn-approve {
      font-family: var(--mono); font-size: 11px; font-weight: 500;
      background: rgba(0,201,122,0.1); border: 1px solid rgba(0,201,122,0.3);
      color: var(--safe); padding: 7px 16px; border-radius: 4px; cursor: pointer;
    }
    .btn-approve:hover { background: rgba(0,201,122,0.2); }
    .btn-reject {
      font-family: var(--mono); font-size: 11px; background: transparent;
      border: 1px solid var(--border2); color: var(--txt3); padding: 7px 16px;
      border-radius: 4px; cursor: pointer;
    }
    .btn-reject:hover { border-color: var(--breaking); color: var(--breaking); }
    .review-result { font-family: var(--mono); font-size: 11px; display: none; }
    .review-result.approved { display: inline; color: var(--safe); }
    .review-result.rejected { display: inline; color: var(--txt2); }
    .login-overlay {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; align-items: center; justify-content: center; z-index: 200;
    }
    .login-box {
      background: var(--surface); border: 1px solid var(--border2);
      border-radius: 10px; padding: 36px 32px; width: 340px;
    }
    .login-title {
      font-family: var(--mono); font-size: 13px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 24px; color: var(--breaking);
    }
    .login-input {
      width: 100%; background: var(--bg2); border: 1px solid var(--border2);
      color: var(--txt); font-family: var(--mono); font-size: 13px;
      padding: 10px 14px; border-radius: 6px; margin-bottom: 12px;
      outline: none; transition: border-color 0.2s;
    }
    .login-input:focus { border-color: var(--breaking); }
    .login-btn {
      width: 100%; background: var(--breaking); border: none; color: #fff;
      font-family: var(--mono); font-size: 12px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase; padding: 11px;
      border-radius: 6px; cursor: pointer; transition: opacity 0.2s;
    }
    .login-btn:hover { opacity: 0.85; }
    .login-error { font-family: var(--mono); font-size: 11px; color: var(--breaking); margin-top: 8px; display: none; }
    .login-error.visible { display: block; }
  </style>
</head>
<body>

<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <div class="login-title">Review Panel</div>
    <input type="password" class="login-input" id="loginInput" placeholder="passcode" />
    <button class="login-btn" id="loginBtn">Acceder</button>
    <div class="login-error" id="loginError">Passcode incorrecto</div>
  </div>
</div>

<div class="topbar">
  <div class="topbar-logo">
    <div class="logo-box">!</div>
    DS ENGINE &middot; REVIEW PANEL
  </div>
  <div class="topbar-right">
    <span class="badge-count" id="badgeCount">0</span>
    <button class="btn-refresh" id="btnRefresh">Actualizar</button>
  </div>
</div>

<div class="main">
  <div class="page-tag">Flujo Inverso F-02</div>
  <h1 class="page-title">Cambios pendientes de revision</h1>
  <p class="page-sub">Cambios breaking detectados en la libreria Simple. Aprueba para aplicar o rechaza para descartar.</p>
  <div class="loading" id="loadingState">Cargando revisiones...</div>
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">&#10003;</div>
    <div class="empty-title">Sin cambios pendientes</div>
    <div class="empty-sub">El Design System esta sincronizado.</div>
  </div>
  <div class="reviews-list" id="reviewsList"></div>
</div>

<script>
var API_KEY = '';
var BASE_URL = window.location.origin;

function init() {
  document.getElementById('loginBtn').addEventListener('click', doLogin);
  document.getElementById('loginInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('btnRefresh').addEventListener('click', loadReviews);
}

function doLogin() {
  var val = document.getElementById('loginInput').value.trim();
  if (val === 'DSIA-2026') {
    API_KEY = 'dev-key-local-2025';
    document.getElementById('loginOverlay').style.display = 'none';
    loadReviews();
  } else {
    document.getElementById('loginError').classList.add('visible');
  }
}

function loadReviews() {
  document.getElementById('loadingState').style.display = 'block';
  document.getElementById('emptyState').classList.remove('visible');
  document.getElementById('reviewsList').innerHTML = '';

  fetch(BASE_URL + '/review/pending', {
    headers: { 'X-API-Key': API_KEY }
  })
  .then(function(res) { return res.json(); })
  .then(function(data) {
    document.getElementById('loadingState').style.display = 'none';

    if (!data.reviews || data.reviews.length === 0) {
      document.getElementById('emptyState').classList.add('visible');
      document.getElementById('badgeCount').classList.remove('visible');
      return;
    }

    var badge = document.getElementById('badgeCount');
    badge.textContent = data.reviews.length;
    badge.classList.add('visible');

    var list = document.getElementById('reviewsList');
    data.reviews.forEach(function(review) {
      list.appendChild(buildCard(review));
    });
  })
  .catch(function(err) {
    document.getElementById('loadingState').textContent = 'Error: ' + err.message;
  });
}

function buildCard(review) {
  var iconMap = { 'COMPONENT_DELETED': 'DEL', 'COMPONENT_RENAMED': 'REN', 'COMPONENT_MODIFIED': 'MOD' };
  var icon = iconMap[review.reason] || '!!!';
  var ts = review.timestamp ? new Date(review.timestamp).toLocaleString('es-ES') : '-';

  var card = document.createElement('div');
  card.className = 'review-card';
  card.setAttribute('data-file', review.file);

  var header = document.createElement('div');
  header.className = 'review-header';
  header.innerHTML =
    '<div class="review-icon">' + icon + '</div>' +
    '<div class="review-info">' +
      '<div class="review-name">' + escHtml(review.component || review.file) + '</div>' +
      '<div class="review-meta">' + escHtml(ts) + '</div>' +
    '</div>' +
    '<div class="review-type">' + escHtml(review.reason || 'BREAKING') + '</div>';

  var body = document.createElement('div');
  body.className = 'review-body';

  var keyDiv = document.createElement('div');
  keyDiv.className = 'review-key';
  keyDiv.textContent = 'key: ' + (review.componentKey || '-');

  var actions = document.createElement('div');
  actions.className = 'review-actions';

  var btnApprove = document.createElement('button');
  btnApprove.className = 'btn-approve';
  btnApprove.textContent = 'Aprobar cambio';
  btnApprove.addEventListener('click', function() { doAction('approve', review.file, card); });

  var btnReject = document.createElement('button');
  btnReject.className = 'btn-reject';
  btnReject.textContent = 'Rechazar';
  btnReject.addEventListener('click', function() { doAction('reject', review.file, card); });

  var result = document.createElement('span');
  result.className = 'review-result';
  result.id = 'result-' + review.file;

  actions.appendChild(btnApprove);
  actions.appendChild(btnReject);
  actions.appendChild(result);
  body.appendChild(keyDiv);
  body.appendChild(actions);
  card.appendChild(header);
  card.appendChild(body);
  return card;
}

function doAction(type, file, card) {
  var btns = card.querySelectorAll('button');
  btns.forEach(function(b) { b.disabled = true; });

  fetch(BASE_URL + '/review/' + type, {
    method: 'POST',
    headers: { 'X-API-Key': API_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ file: file })
  })
  .then(function(res) { return res.json(); })
  .then(function() {
    card.classList.add('resolved');
    var result = document.getElementById('result-' + file);
    result.textContent = type === 'approve' ? 'Aprobado' : 'Rechazado';
    result.className = 'review-result ' + (type === 'approve' ? 'approved' : 'rejected');

    var badge = document.getElementById('badgeCount');
    var current = parseInt(badge.textContent) - 1;
    if (current <= 0) {
      badge.classList.remove('visible');
      setTimeout(function() {
        document.getElementById('reviewsList').innerHTML = '';
        document.getElementById('emptyState').classList.add('visible');
      }, 600);
    } else {
      badge.textContent = current;
    }
  })
  .catch(function(err) {
    btns.forEach(function(b) { b.disabled = false; });
    alert('Error: ' + err.message);
  });
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
