<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>DS IA-Ready Engine</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f11; --surface: #1a1a1f; --surface2: #22222a; --border: #2e2e38;
    --accent: #7c5cfc; --accent-dim: #4a3a9a; --text: #e8e8f0; --text-dim: #7a7a90;
    --success: #4ade80; --warning: #fbbf24; --error: #f87171; --radius: 8px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); height: 620px; overflow: hidden; display: flex; flex-direction: column; }
  .header { padding: 14px 20px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .logo { display: flex; align-items: center; gap: 8px; }
  .logo-icon { width: 26px; height: 26px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 13px; }
  .logo-text { font-size: 13px; font-weight: 600; }
  .logo-sub { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-dim); transition: background 0.3s; }
  .status-dot.online { background: var(--success); box-shadow: 0 0 6px var(--success); }
  .status-dot.error { background: var(--error); }
  .main { flex: 1; overflow-y: auto; padding: 14px 20px; display: flex; flex-direction: column; gap: 12px; }
  .field-label { font-size: 10px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 5px; }
  textarea { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 13px; line-height: 1.5; padding: 10px 12px; resize: none; height: 72px; font-family: inherit; }
  textarea:focus { outline: none; border-color: var(--accent); }
  textarea::placeholder { color: var(--text-dim); }
  .pattern-row { display: flex; gap: 5px; flex-wrap: wrap; }
  .chip { padding: 3px 9px; background: var(--surface); border: 1px solid var(--border); border-radius: 100px; font-size: 11px; color: var(--text-dim); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .chip:hover { border-color: var(--accent); color: var(--text); }
  .chip.active { background: var(--accent-dim); border-color: var(--accent); color: var(--text); }
  .btn-generate { width: 100%; padding: 10px; background: var(--accent); color: white; border: none; border-radius: var(--radius); font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
  .btn-generate:hover { opacity: 0.88; }
  .btn-generate:disabled { opacity: 0.4; cursor: not-allowed; }
  .status-bar { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 9px 12px; font-size: 12px; color: var(--text-dim); min-height: 36px; display: flex; align-items: center; gap: 8px; }
  .status-bar.error { border-color: var(--error); color: var(--error); }
  .status-bar.success { border-color: var(--success); color: var(--success); }
  .result-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; display: none; flex-direction: column; gap: 10px; }
  .result-card.visible { display: flex; }
  .result-header { display: flex; align-items: center; justify-content: space-between; }
  .result-pattern { font-size: 12px; font-weight: 600; background: var(--surface2); padding: 3px 8px; border-radius: 4px; }
  .confidence-badge { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 4px; }
  .confidence-badge.AUTO_APPROVE { background: #14532d; color: var(--success); }
  .confidence-badge.REVIEW_FLAGGED { background: #451a03; color: var(--warning); }
  .confidence-badge.NEEDS_REVIEW { background: #450a0a; color: var(--error); }
  .signals { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
  .signal-item { background: var(--surface2); border-radius: 6px; padding: 6px 9px; }
  .signal-name { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
  .signal-bar-wrap { background: var(--border); border-radius: 2px; height: 3px; overflow: hidden; margin-bottom: 3px; }
  .signal-bar { height: 100%; border-radius: 2px; background: var(--accent); transition: width 0.4s ease; }
  .signal-value { font-size: 11px; font-weight: 600; }
  .components-list { display: flex; flex-direction: column; gap: 3px; }
  .comp-row { display: flex; align-items: center; gap: 8px; padding: 5px 8px; background: var(--surface2); border-radius: 5px; }
  .comp-order { font-size: 10px; color: var(--text-dim); width: 14px; text-align: right; }
  .comp-name { font-size: 11px; font-weight: 500; flex: 1; }
  .comp-node-id { font-size: 10px; color: var(--accent); font-family: 'SF Mono', monospace; background: var(--bg); padding: 2px 5px; border-radius: 3px; }
  .violations-list { display: flex; flex-direction: column; gap: 4px; }
  .violation-row { padding: 7px 10px; border-radius: 5px; border-left: 3px solid; }
  .violation-row.error { background: rgba(248,113,113,0.08); border-color: var(--error); }
  .violation-row.warning { background: rgba(251,191,36,0.08); border-color: var(--warning); }
  .violation-rule { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
  .violation-row.error .violation-rule { color: var(--error); }
  .violation-row.warning .violation-rule { color: var(--warning); }
  .violation-detail { font-size: 11px; color: var(--text-dim); line-height: 1.4; }
  .violation-action { font-size: 10px; color: var(--text-dim); font-style: italic; margin-top: 2px; }
  .missing-section { background: rgba(251,191,36,0.05); border: 1px dashed rgba(251,191,36,0.25); border-radius: var(--radius); padding: 10px 12px; }
  .missing-section .field-label { color: var(--warning); margin-bottom: 6px; }
  .missing-item { display: flex; align-items: flex-start; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--border); }
  .missing-item:last-child { border-bottom: none; padding-bottom: 0; }
  .missing-item-name { font-size: 11px; font-weight: 600; color: var(--warning); min-width: 90px; }
  .missing-item-reason { font-size: 11px; color: var(--text-dim); line-height: 1.4; flex: 1; }
  .spinner { width: 13px; height: 13px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .main::-webkit-scrollbar { width: 4px; }
  .main::-webkit-scrollbar-track { background: transparent; }
  .main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<div class="header">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div>
      <div class="logo-text">DS IA-Ready Engine</div>
      <div class="logo-sub">Simple DS · V1</div>
    </div>
  </div>
  <div class="status-dot" id="statusDot"></div>
</div>
<div class="main">
  <div>
    <div class="field-label">Brief</div>
    <textarea id="briefInput" placeholder="Ej: quiero ver el listado de mis transacciones con filtros"></textarea>
  </div>
  <div>
    <div class="field-label">Patrón (opcional)</div>
    <div class="pattern-row" id="patternChips">
      <div class="chip active" data-pattern="">Auto</div>
      <div class="chip" data-pattern="lista-con-filtros">lista-filtros</div>
      <div class="chip" data-pattern="formulario-simple">formulario</div>
      <div class="chip" data-pattern="confirmacion">confirmacion</div>
      <div class="chip" data-pattern="detalle">detalle</div>
      <div class="chip" data-pattern="dashboard">dashboard</div>
    </div>
  </div>
  <button class="btn-generate" id="generateBtn">Generar pantalla</button>
  <div class="status-bar" id="statusBar">Listo para generar</div>
  <div class="result-card" id="resultCard">
    <div class="result-header">
      <span class="result-pattern" id="resultPattern">—</span>
      <span class="confidence-badge" id="confidenceBadge">—</span>
    </div>
    <div class="signals" id="signalsGrid"></div>
    <div>
      <div class="field-label" style="margin-bottom:5px">Componentes</div>
      <div class="components-list" id="componentsList"></div>
    </div>
    <div id="missingSection" style="display:none" class="missing-section">
      <div class="field-label">✗ No disponible en el DS</div>
      <div id="missingList"></div>
    </div>
    <div id="violationsSection" style="display:none">
      <div class="field-label" style="margin-bottom:5px;color:var(--error)">⚠ Violaciones del DS</div>
      <div class="violations-list" id="violationsList"></div>
    </div>
  </div>
</div>
<script>
  var selectedPattern = '';
  document.querySelectorAll('.chip').forEach(function(chip) {
    chip.addEventListener('click', function() {
      document.querySelectorAll('.chip').forEach(function(c) { c.classList.remove('active'); });
      chip.classList.add('active');
      selectedPattern = chip.dataset.pattern;
    });
  });
  document.getElementById('generateBtn').addEventListener('click', function() {
    var brief = document.getElementById('briefInput').value.trim();
    if (!brief) { setStatus('Escribe un brief antes de generar', 'error'); return; }
    setGenerating(true);
    setStatus('', 'loading');
    document.getElementById('resultCard').classList.remove('visible');
    parent.postMessage({ pluginMessage: { type: 'generate', brief: brief, patternOverride: selectedPattern || undefined } }, '*');
  });
  parent.postMessage({ pluginMessage: { type: 'ping' } }, '*');
  window.onmessage = function(event) {
    var msg = event.data.pluginMessage;
    if (!msg) return;
    if (msg.type === 'ping-result') {
      var dot = document.getElementById('statusDot');
      if (msg.ok) { dot.classList.add('online'); dot.classList.remove('error'); dot.title = 'Engine online'; }
      else { dot.classList.add('error'); dot.classList.remove('online'); dot.title = 'Engine offline'; }
    }
    if (msg.type === 'status') { setStatus(msg.text, 'loading'); }
    if (msg.type === 'error') { setGenerating(false); setStatus(msg.text, 'error'); }
    if (msg.type === 'success') {
      setGenerating(false);
      setStatus('✓ Pantalla pintada — node ' + msg.nodeId, 'success');
      renderResult(msg);
    }
  };
  function setGenerating(loading) {
    var btn = document.getElementById('generateBtn');
    btn.disabled = loading;
    btn.textContent = loading ? 'Generando...' : 'Generar pantalla';
  }
  function setStatus(text, type) {
    var bar = document.getElementById('statusBar');
    bar.className = 'status-bar' + (type === 'error' ? ' error' : type === 'success' ? ' success' : '');
    bar.innerHTML = type === 'loading' ? '<div class="spinner"></div><span>' + (text || 'Procesando...') + '</span>' : (text || 'Listo para generar');
  }
  function renderResult(msg) {
    document.getElementById('resultCard').classList.add('visible');
    document.getElementById('resultPattern').textContent = msg.pattern;
    var badge = document.getElementById('confidenceBadge');
    badge.textContent = msg.confidence.status + ' ' + Math.round(msg.confidence.global * 100) + '%';
    badge.className = 'confidence-badge ' + msg.confidence.status;
    var signalNames = { contract_coverage: 'Cobertura', precedent: 'Precedente', intent_clarity: 'Intención', rule_compliance: 'Reglas' };
    var grid = document.getElementById('signalsGrid');
    grid.innerHTML = '';
    Object.keys(msg.confidence.signals).forEach(function(key) {
      var pct = Math.round(msg.confidence.signals[key] * 100);
      grid.innerHTML += '<div class="signal-item"><div class="signal-name">' + (signalNames[key] || key) + '</div><div class="signal-bar-wrap"><div class="signal-bar" style="width:' + pct + '%"></div></div><div class="signal-value">' + pct + '%</div></div>';
    });
    var list = document.getElementById('componentsList');
    list.innerHTML = '';
    msg.components.forEach(function(comp) {
      list.innerHTML += '<div class="comp-row"><span class="comp-order">' + comp.order + '</span><span class="comp-name">' + comp.component + '</span>' + (comp.node_id ? '<span class="comp-node-id">' + comp.node_id + '</span>' : '') + '</div>';
    });
    var missing = msg.missing_components || [];
    var msection = document.getElementById('missingSection');
    var mlist = document.getElementById('missingList');
    if (missing.length > 0) {
      msection.style.display = 'block';
      mlist.innerHTML = '';
      missing.forEach(function(m) {
        mlist.innerHTML += '<div class="missing-item"><span class="missing-item-name">' + m.name + '</span><span class="missing-item-reason">' + m.reason + '</span></div>';
      });
    } else { msection.style.display = 'none'; }
    var violations = msg.violations || [];
    var vsection = document.getElementById('violationsSection');
    var vlist = document.getElementById('violationsList');
    if (violations.length > 0) {
      vsection.style.display = 'block';
      vlist.innerHTML = '';
      violations.forEach(function(v) {
        vlist.innerHTML += '<div class="violation-row ' + v.severity + '"><div class="violation-rule">' + v.rule + '</div><div class="violation-detail">' + v.detail + '</div>' + (v.action ? '<div class="violation-action">' + v.action + '</div>' : '') + '</div>';
      });
    } else { vsection.style.display = 'none'; }
  }
</script>
</body>
</html>
