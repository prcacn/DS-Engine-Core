<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DS IA-Ready Engine</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f11;
    --surface: #1a1a1f;
    --surface2: #22222a;
    --border: #2e2e38;
    --accent: #7c5cfc;
    --accent-dim: #4a3a9a;
    --text: #e8e8f0;
    --text-dim: #7a7a90;
    --success: #4ade80;
    --warning: #fbbf24;
    --error: #f87171;
    --radius: 8px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 560px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  .header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo-icon {
    width: 28px;
    height: 28px;
    background: var(--accent);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }

  .logo-text {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.2px;
  }

  .logo-sub {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--text-dim);
    transition: background 0.3s;
  }

  .status-dot.online { background: var(--success); box-shadow: 0 0 6px var(--success); }
  .status-dot.error  { background: var(--error); }

  /* MAIN */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* BRIEF INPUT */
  .field-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 6px;
  }

  textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 13px;
    line-height: 1.5;
    padding: 10px 12px;
    resize: none;
    height: 80px;
    transition: border-color 0.15s;
    font-family: inherit;
  }

  textarea:focus {
    outline: none;
    border-color: var(--accent);
  }

  textarea::placeholder { color: var(--text-dim); }

  /* PATTERN OVERRIDE */
  .pattern-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .chip {
    padding: 4px 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px;
    font-size: 11px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .chip:hover { border-color: var(--accent); color: var(--text); }
  .chip.active { background: var(--accent-dim); border-color: var(--accent); color: var(--text); }

  /* GENERATE BUTTON */
  .btn-generate {
    width: 100%;
    padding: 11px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
    letter-spacing: -0.1px;
  }

  .btn-generate:hover { opacity: 0.88; }
  .btn-generate:disabled { opacity: 0.4; cursor: not-allowed; }

  /* STATUS BAR */
  .status-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    font-size: 12px;
    color: var(--text-dim);
    min-height: 38px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .status-bar.error { border-color: var(--error); color: var(--error); }
  .status-bar.success { border-color: var(--success); color: var(--success); }

  /* RESULT CARD */
  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    display: none;
    flex-direction: column;
    gap: 10px;
  }

  .result-card.visible { display: flex; }

  .result-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .result-pattern {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    background: var(--surface2);
    padding: 3px 8px;
    border-radius: 4px;
  }

  .confidence-badge {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 4px;
  }

  .confidence-badge.AUTO_APPROVE { background: #14532d; color: var(--success); }
  .confidence-badge.REVIEW_FLAGGED { background: #451a03; color: var(--warning); }
  .confidence-badge.NEEDS_REVIEW { background: #450a0a; color: var(--error); }

  /* SIGNALS */
  .signals {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .signal-item {
    background: var(--surface2);
    border-radius: 6px;
    padding: 7px 10px;
  }

  .signal-name {
    font-size: 9px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 3px;
  }

  .signal-bar-wrap {
    background: var(--border);
    border-radius: 2px;
    height: 3px;
    overflow: hidden;
    margin-bottom: 3px;
  }

  .signal-bar {
    height: 100%;
    border-radius: 2px;
    background: var(--accent);
    transition: width 0.4s ease;
  }

  .signal-value {
    font-size: 11px;
    font-weight: 600;
    color: var(--text);
  }

  /* COMPONENTS LIST */
  .components-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .comp-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    background: var(--surface2);
    border-radius: 5px;
  }

  .comp-order {
    font-size: 10px;
    color: var(--text-dim);
    width: 14px;
    text-align: right;
  }

  .comp-name {
    font-size: 11px;
    font-weight: 500;
    color: var(--text);
    flex: 1;
  }

  .comp-node-id {
    font-size: 10px;
    color: var(--accent);
    font-family: 'SF Mono', monospace;
    background: var(--bg);
    padding: 2px 5px;
    border-radius: 3px;
  }

  /* SPINNER */
  .spinner {
    width: 14px;
    height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* VIOLATIONS */
  .violations-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .violation-row {
    padding: 8px 10px;
    border-radius: 5px;
    border-left: 3px solid;
  }

  .violation-row.error {
    background: rgba(248, 113, 113, 0.08);
    border-color: var(--error);
  }

  .violation-row.warning {
    background: rgba(251, 191, 36, 0.08);
    border-color: var(--warning);
  }

  .violation-rule {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 2px;
  }

  .violation-row.error .violation-rule { color: var(--error); }
  .violation-row.warning .violation-rule { color: var(--warning); }

  .violation-detail {
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.4;
  }

  .violation-action {
    font-size: 10px;
    color: var(--text-dim);
    font-style: italic;
    margin-top: 2px;
  }

  /* SCROLLBAR */
  .main::-webkit-scrollbar { width: 4px; }
  .main::-webkit-scrollbar-track { background: transparent; }
  .main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div>
      <div class="logo-text">DS IA-Ready Engine</div>
      <div class="logo-sub">Simple DS · V1</div>
    </div>
  </div>
  <div class="status-dot" id="statusDot" title="Verificando engine..."></div>
</div>

<div class="main">

  <!-- BRIEF -->
  <div>
    <div class="field-label">Brief</div>
    <textarea id="briefInput" placeholder="Ej: quiero ver el listado de mis transacciones recientes con filtros por tipo y fecha" rows="3"></textarea>
  </div>

  <!-- PATTERN OVERRIDE -->
  <div>
    <div class="field-label">Patrón (opcional)</div>
    <div class="pattern-row" id="patternChips">
      <div class="chip" data-pattern="">Auto</div>
      <div class="chip" data-pattern="lista-con-filtros">lista-con-filtros</div>
      <div class="chip" data-pattern="formulario-simple">formulario-simple</div>
      <div class="chip" data-pattern="confirmacion">confirmacion</div>
      <div class="chip" data-pattern="detalle">detalle</div>
    </div>
  </div>

  <!-- GENERATE -->
  <button class="btn-generate" id="generateBtn">Generar pantalla</button>

  <!-- STATUS -->
  <div class="status-bar" id="statusBar">Listo para generar</div>

  <!-- RESULT -->
  <div class="result-card" id="resultCard">
    <div class="result-header">
      <span class="result-pattern" id="resultPattern">—</span>
      <span class="confidence-badge" id="confidenceBadge">—</span>
    </div>

    <div class="signals" id="signalsGrid"></div>

    <div>
      <div class="field-label" style="margin-bottom:6px">Componentes</div>
      <div class="components-list" id="componentsList"></div>
    </div>

    <!-- VIOLATIONS -->
    <div id="violationsSection" style="display:none">
      <div class="field-label" style="margin-bottom:6px;color:var(--error)">⚠ Violaciones del DS</div>
      <div class="violations-list" id="violationsList"></div>
    </div>

  </div>

</div>

<script>
  let selectedPattern = '';

  // ── CHIPS ──────────────────────────────────────────────────────────────────
  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      selectedPattern = chip.dataset.pattern;
    });
  });
  document.querySelector('.chip[data-pattern=""]').classList.add('active');

  // ── GENERATE ───────────────────────────────────────────────────────────────
  document.getElementById('generateBtn').addEventListener('click', () => {
    const brief = document.getElementById('briefInput').value.trim();
    if (!brief) {
      setStatus('Escribe un brief antes de generar', 'error');
      return;
    }
    setGenerating(true);
    setStatus('', 'loading');
    document.getElementById('resultCard').classList.remove('visible');

    parent.postMessage({
      pluginMessage: {
        type: 'generate',
        brief,
        patternOverride: selectedPattern || undefined,
      }
    }, '*');
  });

  // ── PING al cargar ─────────────────────────────────────────────────────────
  parent.postMessage({ pluginMessage: { type: 'ping' } }, '*');

  // ── MENSAJES DESDE CODE.JS ─────────────────────────────────────────────────
  window.onmessage = (event) => {
    const msg = event.data.pluginMessage;
    if (!msg) return;

    if (msg.type === 'ping-result') {
      const dot = document.getElementById('statusDot');
      dot.classList.toggle('online', msg.ok);
      dot.classList.toggle('error', !msg.ok);
      dot.title = msg.ok ? `Engine online · ${msg.data?.ds_repo}` : 'Engine offline';
    }

    if (msg.type === 'status') {
      setStatus(msg.text, 'loading');
    }

    if (msg.type === 'error') {
      setGenerating(false);
      setStatus(msg.text, 'error');
    }

    if (msg.type === 'success') {
      setGenerating(false);
      setStatus(`✓ Pantalla pintada — node ${msg.nodeId}`, 'success');
      renderResult(msg);
    }
  };

  // ── HELPERS ────────────────────────────────────────────────────────────────

  function setGenerating(loading) {
    const btn = document.getElementById('generateBtn');
    btn.disabled = loading;
    btn.textContent = loading ? 'Generando...' : 'Generar pantalla';
  }

  function setStatus(text, type) {
    const bar = document.getElementById('statusBar');
    bar.className = 'status-bar' + (type === 'error' ? ' error' : type === 'success' ? ' success' : '');
    bar.innerHTML = type === 'loading'
      ? `<div class="spinner"></div><span>${text}</span>`
      : text || 'Listo para generar';
  }

  function renderResult(msg) {
    const card = document.getElementById('resultCard');
    card.classList.add('visible');

    // Pattern + confidence
    document.getElementById('resultPattern').textContent = msg.pattern;
    const badge = document.getElementById('confidenceBadge');
    badge.textContent = msg.confidence.status + ' ' + Math.round(msg.confidence.global * 100) + '%';
    badge.className = 'confidence-badge ' + msg.confidence.status;

    // Signals
    const signalNames = {
      contract_coverage: 'Cobertura',
      precedent: 'Precedente',
      intent_clarity: 'Intención',
      rule_compliance: 'Reglas',
    };
    const grid = document.getElementById('signalsGrid');
    grid.innerHTML = '';
    Object.keys(msg.confidence.signals).forEach(function(key) {
      const val = msg.confidence.signals[key];
      const pct = Math.round(val * 100);
      grid.innerHTML += '<div class="signal-item"><div class="signal-name">' + (signalNames[key] || key) + '</div><div class="signal-bar-wrap"><div class="signal-bar" style="width:' + pct + '%"></div></div><div class="signal-value">' + pct + '%</div></div>';
    });

    // Components
    const list = document.getElementById('componentsList');
    list.innerHTML = '';
    msg.components.forEach(function(comp) {
      list.innerHTML += '<div class="comp-row"><span class="comp-order">' + comp.order + '</span><span class="comp-name">' + comp.component + '</span>' + (comp.node_id ? '<span class="comp-node-id">' + comp.node_id + '</span>' : '') + '</div>';
    });

    // Violations
    const violations = msg.violations || [];
    const vsection = document.getElementById('violationsSection');
    const vlist = document.getElementById('violationsList');
    if (violations.length > 0) {
      vsection.style.display = 'block';
      vlist.innerHTML = '';
      violations.forEach(function(v) {
        vlist.innerHTML += '<div class="violation-row ' + v.severity + '"><div class="violation-rule">' + v.rule + '</div><div class="violation-detail">' + v.detail + '</div>' + (v.action ? '<div class="violation-action">' + v.action + '</div>' : '') + '</div>';
      });
    } else {
      vsection.style.display = 'none';
      vlist.innerHTML = '';
    }
  }
</script>
</body>
</html>
